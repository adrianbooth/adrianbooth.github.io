<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trinity Piano Scales</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e12;
    --surface: #16161e;
    --card: #1c1c26;
    --border: #2a2a3a;
    --accent: #c8a97e;
    --accent2: #7e9fc8;
    --rh: #e8b4a0;
    --lh: #a0c8b4;
    --text: #e8e6e0;
    --muted: #6e6e82;
    --sharp: #f0c060;
    --flat: #88b8f0;
    --natural: #d0d0c8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
  }
  header {
    text-align: center;
    padding: 3rem 1rem 2rem;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(200,169,126,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 900;
    color: var(--accent);
    letter-spacing: -0.02em;
    line-height: 1;
  }
  header p {
    margin-top: 0.75rem;
    color: var(--muted);
    font-size: 0.78rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

/* Legend */
.legend {
display: flex;
gap: 1.5rem;
justify-content: center;
flex-wrap: wrap;
padding: 1.2rem 1rem;
border-bottom: 1px solid var(вҖ“border);
font-size: 0.72rem;
letter-spacing: 0.05em;
}
.legend-item { display: flex; align-items: center; gap: 0.4rem; }
.dot { width: 10px; height: 10px; border-radius: 50%; }

/* Nav */
nav {
display: flex;
gap: 0.5rem;
padding: 1rem;
overflow-x: auto;
border-bottom: 1px solid var(вҖ“border);
scrollbar-width: none;
justify-content: center;
flex-wrap: wrap;
}
nav button {
background: var(вҖ“surface);
border: 1px solid var(вҖ“border);
color: var(вҖ“muted);
padding: 0.35rem 0.75rem;
border-radius: 4px;
font-family: вҖҳDM MonoвҖҷ, monospace;
font-size: 0.72rem;
cursor: pointer;
white-space: nowrap;
transition: all 0.15s;
letter-spacing: 0.05em;
}
nav button:hover, nav button.active {
border-color: var(вҖ“accent);
color: var(вҖ“accent);
background: rgba(200,169,126,0.08);
}

main { padding: 1.5rem 1rem; max-width: 1100px; margin: 0 auto; }

.grade-section { display: none; }
.grade-section.active { display: block; }

.grade-header {
display: flex;
align-items: baseline;
gap: 1rem;
margin-bottom: 1.5rem;
padding-bottom: 0.75rem;
border-bottom: 1px solid var(вҖ“border);
}
.grade-title {
font-family: вҖҳPlayfair DisplayвҖҷ, serif;
font-size: 1.8rem;
color: var(вҖ“accent);
font-weight: 700;
}
.grade-subtitle { color: var(вҖ“muted); font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; }

.scales-grid {
display: grid;
gap: 1.2rem;
}

.scale-card {
background: var(вҖ“card);
border: 1px solid var(вҖ“border);
border-radius: 8px;
overflow: hidden;
}
.scale-card-header {
display: flex;
align-items: center;
justify-content: space-between;
padding: 0.75rem 1rem;
background: var(вҖ“surface);
border-bottom: 1px solid var(вҖ“border);
cursor: pointer;
user-select: none;
}
.scale-name {
font-family: вҖҳPlayfair DisplayвҖҷ, serif;
font-size: 1.1rem;
color: var(вҖ“text);
}
.scale-type {
font-size: 0.68rem;
color: var(вҖ“muted);
letter-spacing: 0.1em;
text-transform: uppercase;
margin-top: 0.1rem;
}
.octave-badge {
font-size: 0.65rem;
padding: 0.2rem 0.5rem;
border-radius: 3px;
background: rgba(126,159,200,0.15);
color: var(вҖ“accent2);
border: 1px solid rgba(126,159,200,0.3);
letter-spacing: 0.08em;
}
.toggle-icon {
color: var(вҖ“muted);
font-size: 0.8rem;
transition: transform 0.2s;
margin-left: 0.75rem;
}
.scale-card.open .toggle-icon { transform: rotate(180deg); }

.scale-body { display: none; padding: 1rem; }
.scale-card.open .scale-body { display: block; }

/* Notes display */
.hand-section { margin-bottom: 1rem; }
.hand-section:last-child { margin-bottom: 0; }
.hand-label {
font-size: 0.65rem;
letter-spacing: 0.15em;
text-transform: uppercase;
margin-bottom: 0.5rem;
display: flex;
align-items: center;
gap: 0.5rem;
}
.hand-label.rh { color: var(вҖ“rh); }
.hand-label.lh { color: var(вҖ“lh); }
.hand-label::after {
content: вҖҳвҖҷ;
flex: 1;
height: 1px;
background: var(вҖ“border);
}

.notes-row {
display: flex;
flex-wrap: wrap;
gap: 0.35rem;
align-items: flex-end;
}
.note-cell {
display: flex;
flex-direction: column;
align-items: center;
min-width: 36px;
}
.finger {
font-size: 0.7rem;
color: var(вҖ“muted);
margin-bottom: 0.15rem;
font-weight: 500;
height: 1rem;
line-height: 1;
}
.note-name {
font-size: 0.8rem;
font-weight: 500;
padding: 0.25rem 0.3rem;
border-radius: 4px;
min-width: 34px;
text-align: center;
line-height: 1.2;
}
.note-name.sharp { color: var(вҖ“sharp); background: rgba(240,192,96,0.1); border: 1px solid rgba(240,192,96,0.25); }
.note-name.flat  { color: var(вҖ“flat);  background: rgba(136,184,240,0.1); border: 1px solid rgba(136,184,240,0.25); }
.note-name.nat   { color: var(вҖ“natural); background: rgba(208,208,200,0.08); border: 1px solid rgba(208,208,200,0.15); }

.divider-note {
font-size: 0.65rem;
color: var(вҖ“muted);
align-self: center;
padding: 0 0.1rem;
opacity: 0.5;
}

.note-count {
font-size: 0.62rem;
color: var(вҖ“muted);
margin-top: 0.5rem;
letter-spacing: 0.05em;
}

/* Thumb marker */
.finger.thumb { color: var(вҖ“accent); font-weight: 600; }

footer {
text-align: center;
padding: 2rem 1rem;
border-top: 1px solid var(вҖ“border);
color: var(вҖ“muted);
font-size: 0.68rem;
letter-spacing: 0.08em;
}

@media (min-width: 700px) {
.scales-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (min-width: 1000px) {
.scales-grid { grid-template-columns: repeat(3, 1fr); }
}
</style>

</head>

<nav id="gradeNav"></nav>
<main id="main"></main>

<footer>Fingering follows standard ABRSM/Trinity conventions. RH fingers: 1=thumb вҶ’ 5=pinky. LH fingers: 5=pinky вҶ’ 1=thumb.</footer>

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// RENDER
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

const nav = document.getElementById('gradeNav');
const main = document.getElementById('main');

GRADES.forEach((g, gi) => {
  // Nav button
  const btn = document.createElement('button');
  btn.textContent = g.grade;
  btn.dataset.gi = gi;
  if (gi === 0) btn.classList.add('active');
  btn.addEventListener('click', () => {
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.grade-section').forEach(s => s.classList.remove('active'));
    document.getElementById('grade-' + gi).classList.add('active');
  });
  nav.appendChild(btn);

  // Section
  const sec = document.createElement('div');
  sec.className = 'grade-section' + (gi === 0 ? ' active' : '');
  sec.id = 'grade-' + gi;

  const hdr = document.createElement('div');
  hdr.className = 'grade-header';
  hdr.innerHTML = `<div class="grade-title">${g.grade}</div><div class="grade-subtitle">${g.desc}</div>`;
  sec.appendChild(hdr);

  const grid = document.createElement('div');
  grid.className = 'scales-grid';

  g.scales.forEach(scale => {
    const card = document.createElement('div');
    card.className = 'scale-card';

    card.innerHTML = `
      <div class="scale-card-header">
        <div>
          <div class="scale-name">${scale.name}</div>
          <div class="scale-type">${scale.type}</div>
        </div>
        <div style="display:flex;align-items:center;gap:0.5rem">
          <span class="octave-badge">${scale.octaves} oct.</span>
          <span class="toggle-icon">в–ҫ</span>
        </div>
      </div>
      <div class="scale-body">${renderScaleBody(scale)}</div>
    `;

    card.querySelector('.scale-card-header').addEventListener('click', () => {
      card.classList.toggle('open');
    });

    grid.appendChild(card);
  });

  sec.appendChild(grid);
  main.appendChild(sec);
});

function renderScaleBody(scale) {
  let html = '';

  if (scale.rh && scale.rh.length > 0) {
    html += `<div class="hand-section">
      <div class="hand-label rh">Right Hand</div>
      <div class="notes-row">${renderNotes(scale.rh)}</div>
    </div>`;
  }

  if (scale.lh && scale.lh.length > 0) {
    html += `<div class="hand-section">
      <div class="hand-label lh">Left Hand</div>
      <div class="notes-row">${renderNotes(scale.lh)}</div>
    </div>`;
  }

  if (scale.note) {
    html += `<div class="note-count" style="margin-top:0.75rem;color:var(--accent2);font-size:0.7rem;line-height:1.5;border-left:2px solid var(--accent2);padding-left:0.5rem">в„№ ${scale.note}</div>`;
  }

  return html;
}

function renderNotes(notes) {
  return notes.map(({ note, cls, finger }) => {
    const isThumb = finger === 1;
    const fingerLabel = isThumb ? 'вҳ…' : finger;
    const fingerClass = isThumb ? 'finger thumb' : 'finger';
    return `<div class="note-cell">
      <div class="${fingerClass}">${fingerLabel}</div>
      <div class="note-name ${cls}">${note}</div>
    </div>`;
  }).join('');
}
